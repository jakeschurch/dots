views:
  v1/pods:
    sortColumn: AGE:asc
    columns:
      - NAME
      - READY
      - STATUS
      - CPU
      - MEM
      - "%CPU/R"
      - "%MEM/R"
      - NAMESPACE
      - IP
      - NODE
  v1/nodes:
    columns:
      - NAME
      - STATUS
      - ROLES
      - TAINTS
      - VERSION
      - PODS
      - CPU
      - MEM
      - "%CPU"
      - "%MEM"
      - AGE
  v1/namespaces:
    columns:
      - NAME
      - STATUS
      - AGE
  v1/persistentvolumeclaims:
    columns:
      - NAME
      - STATUS
      - VOLUME
      - CAPACITY
      - ACCESS MODES
      - STORAGECLASS
      - AGE
      - NAMESPACE
  apps/v1/deployments:
    columns:
      - NAME
      - READY
      - UP-TO-DATE
      - AVAILABLE
      - AGE
      - NAMESPACE
  apps/v1/daemonsets:
    columns:
      - NAME
      - DESIRED
      - CURRENT
      - READY
      - AGE
      - NAMESPACE
  batch/v1/jobs:
    columns:
      - NAME
      - STATUS
      - COMPLETIONS
      - DURATION
      - AGE
      - NAMESPACE
  argoproj.io/v1alpha1/applications:
    columns:
      - NAME
      - SYNC-STATUS
      - HEALTH-STATUS
      - PROJECT
      - DESTINATION-SERVER
      - NAMESPACE
      - AGE
  v1/services:
    columns:
      - NAME
      - TYPE
      - PORT
      - AGE
