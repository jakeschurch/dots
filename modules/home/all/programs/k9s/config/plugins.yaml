plugins:
  jqlogs:
    shortCut: Ctrl-J
    confirm: true
    description: "Logs (jq)"
    scopes:
      - po
    command: kubectl
    background: false
    args:
      - jq
      - $NAME
      - $NAMESPACE
      - $CONTEXT

  stern:
    shortCut: Ctrl-L
    confirm: false
    description: "Stern (multi-pod logs)"
    scopes:
      - po
    command: stern
    background: false
    args:
      - --namespace
      - $NAMESPACE
      - --context
      - $CONTEXT
      - $NAME

  neat:
    shortCut: Ctrl-N
    confirm: false
    description: "Neat YAML"
    scopes:
      - po
      - deploy
      - svc
      - cm
      - secret
      - ds
      - sts
    command: bash
    background: false
    args:
      - -c
      - >-
        kubectl get $RESOURCE_NAME $NAME -n $NAMESPACE --context $CONTEXT -o yaml
        | kubectl neat
        | less -RK

  argocd-sync:
    shortCut: Shift-S
    confirm: true
    description: "ArgoCD Sync"
    scopes:
      - applications
    command: argocd
    background: false
    args:
      - app
      - sync
      - $NAME
      - --grpc-web

  argocd-diff:
    shortCut: Shift-D
    confirm: false
    description: "ArgoCD Diff"
    scopes:
      - applications
    command: bash
    background: false
    args:
      - -c
      - >-
        argocd app diff $NAME --grpc-web | less -RK

  dive:
    shortCut: d
    confirm: false
    description: "Dive image"
    scopes:
      - containers
    command: dive
    background: false
    args:
      - $COL-IMAGE

  helm-diff-previous:
    shortCut: Shift-D
    confirm: false
    description: Diff with Previous Revision
    scopes:
      - helm
    command: bash
    background: false
    args:
      - -c
      - >-
        LAST_REVISION=$(($COL-REVISION-1));
        helm diff revision $COL-NAME $COL-REVISION $LAST_REVISION --kube-context $CONTEXT --namespace $NAMESPACE --color | less -RK

  helm-diff-current:
    shortCut: Shift-Q
    confirm: false
    description: Diff with Current Revision
    scopes:
      - history
    command: bash
    background: false
    args:
      - -c
      - >-
        RELEASE_NAME=$(echo $NAME | cut -d':' -f1);
        LATEST_REVISION=$(helm history -n $NAMESPACE --kube-context $CONTEXT $RELEASE_NAME | grep deployed | cut -d$'\t' -f1 | tr -d ' \t');
        helm diff revision $RELEASE_NAME $LATEST_REVISION $COL-REVISION --kube-context $CONTEXT --namespace $NAMESPACE --color | less -RK
